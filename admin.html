<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台 · 簽到管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C35;
    --orange-deep: #C85000;
    --orange-glow: rgba(255,107,0,0.15);
    --bg: #0F0A05;
    --surface: #1A1008;
    --surface2: #251808;
    --border: #3D2510;
    --text: #FAF0E6;
    --muted: #8A6040;
    --success: #00D97A;
    --danger: #FF4455;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 16px;
  }

  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 13px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 0 24px var(--orange-glow);
  }
  h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
  .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .last-refresh {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  }

  .btn {
    padding: 10px 20px; border: none; border-radius: 9px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  .btn-refresh:hover { border-color: var(--orange); color: var(--orange); }
  .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-export {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: #fff; box-shadow: 0 4px 14px var(--orange-glow);
  }
  .btn-export:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,0,0.4); }

  /* Stats */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 18px; text-align: center;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--orange); }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .c-orange { color: var(--orange); }
  .c-green { color: var(--success); }
  .c-red { color: var(--danger); }
  .c-yellow { color: #FFD32A; }

  /* Search & filter bar */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .toolbar-left { display: flex; align-items: center; gap: 10px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  .search-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; color: var(--text);
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
    outline: none; width: 180px; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--orange); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 12px 20px; font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; text-align: left;
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid rgba(61,37,16,0.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,107,0,0.03); }
  .mono { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 12px; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-in { background: rgba(0,217,122,0.1); color: var(--success); border: 1px solid rgba(0,217,122,0.25); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* Loading overlay */
  .loading-bar {
    height: 3px; background: var(--border); border-radius: 3px;
    margin-bottom: 20px; overflow: hidden; display: none;
  }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: ''; display: block; height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    width: 40%; animation: loadbar 1s ease-in-out infinite alternate;
    border-radius: 3px;
  }
  @keyframes loadbar { from{transform:translateX(-100%)} to{transform:translateX(300%)} }

  /* Live dot */
  .live-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--success); border-radius: 50%;
    margin-right: 6px; animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @media(max-width:600px) {
    .stats-bar { grid-template-columns: repeat(2,1fr); }
    th:nth-child(1), td:nth-child(1) { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div>
        <h1>後台管理</h1>
        <div class="subtitle"><span class="live-dot"></span>ADMIN DASHBOARD</div>
      </div>
    </div>
    <div class="header-right">
      <div class="last-refresh" id="last-refresh">尚未載入</div>
      <button class="btn btn-refresh" id="refresh-btn" onclick="loadData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        重新整理
      </button>
      <button class="btn btn-export" onclick="exportExcel()">📤 匯出 Excel</button>
    </div>
  </header>

  <div class="loading-bar" id="loading-bar"></div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num c-orange" id="s-total">—</div><div class="stat-label">總簽到人數</div></div>
    <div class="stat-card"><div class="stat-num c-yellow" id="s-today">—</div><div class="stat-label">今日簽到</div></div>
    <div class="stat-card"><div class="stat-num c-green" id="s-first">—</div><div class="stat-label">最早簽到</div></div>
    <div class="stat-card"><div class="stat-num c-orange" id="s-last">—</div><div class="stat-label">最新簽到</div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="section-title">簽到紀錄</div>
    </div>
    <input class="search-box" id="search-box" placeholder="🔍 搜尋姓名…" oninput="renderTable()">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>姓名</th>
          <th>狀態</th>
          <th>簽到時間</th>
          <th>日期</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5">
          <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">載入中…</div></div>
        </td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw6kOmdPe42hQZ2pzJMfKj--0Qx454enrhzOtu-Cfl8VqziHoxKn62BeGRk59ct5_h/exec';
let allRecords = [];

async function loadData() {
  const bar = document.getElementById('loading-bar');
  const btn = document.getElementById('refresh-btn');
  bar.classList.add('active');
  btn.classList.add('spinning');

  try {
    const res = await fetch(API + '?t=' + Date.now());
    const data = await res.json();

    if (data.status === 'ok') {
      allRecords = data.records.reverse(); // newest first
      renderTable();
      updateStats();
      document.getElementById('last-refresh').textContent =
        '更新於 ' + new Date().toLocaleTimeString('zh-TW', {hour12:false});
    }
  } catch(e) {
    document.getElementById('table-body').innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">載入失敗，請確認網路或 Apps Script 設定</div></div>
      </td></tr>`;
  }

  bar.classList.remove('active');
  btn.classList.remove('spinning');
}

function renderTable() {
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  const rows = q ? allRecords.filter(r => String(r['姓名']||'').toLowerCase().includes(q)) : allRecords;
  const tbody = document.getElementById('table-body');

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">${allRecords.length ? '找不到符合的記錄' : '尚無簽到記錄'}</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => `
    <tr>
      <td class="mono">${String(rows.length - i).padStart(3,'0')}</td>
      <td style="font-weight:600">${r['姓名'] || '—'}</td>
      <td><span class="badge badge-in">✓ 到</span></td>
      <td class="mono">${r['時間'] || '—'}</td>
      <td class="mono">${r['日期'] || '—'}</td>
    </tr>`).join('');
}

function updateStats() {
  const today = new Date().toLocaleDateString('zh-TW');
  const todayRecords = allRecords.filter(r => r['日期'] === today);
  const times = allRecords.map(r => r['時間']).filter(Boolean);

  document.getElementById('s-total').textContent = allRecords.length;
  document.getElementById('s-today').textContent = todayRecords.length;

  if (times.length) {
    const sorted = [...times].sort();
    document.getElementById('s-first').textContent = sorted[0];
    document.getElementById('s-last').textContent = sorted[sorted.length-1];
  } else {
    document.getElementById('s-first').textContent = '—';
    document.getElementById('s-last').textContent = '—';
  }
}

function exportExcel() {
  if (!allRecords.length) { alert('目前沒有資料可匯出'); return; }
  const headers = ['姓名', '狀態', '簽到時間', '日期'];
  const rows = [headers, ...allRecords.map(r => [r['姓名']||'', '到', r['時間']||'', r['日期']||''])];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:15},{wch:8},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '簽到報表');
  const fname = `簽到報表_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb, fname);
}

// Auto refresh every 30 seconds
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
