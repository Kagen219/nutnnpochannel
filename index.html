<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>簽到</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C35;
    --orange-deep: #E05500;
    --bg: #FFF8F3;
    --surface: #FFFFFF;
    --text: #1A1208;
    --muted: #9E7B5A;
    --border: #F0DECE;
    --success: #2ECC71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }

  /* Decorative background circles */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,0.12), transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,53,0.1), transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border-radius: 28px;
    padding: 44px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 4px 6px rgba(255,107,0,0.05),
      0 20px 60px rgba(180,80,0,0.12),
      0 1px 0 rgba(255,255,255,0.8) inset;
    position: relative;
    z-index: 1;
    animation: cardIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Orange accent bar at top */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 0 0 4px 4px;
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }

  .logo-badge {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 8px 24px rgba(255,107,0,0.35);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 24px rgba(255,107,0,0.35); }
    50% { box-shadow: 0 8px 36px rgba(255,107,0,0.55); }
  }

  h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 36px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 16px 20px;
    font-size: 18px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    color: var(--text);
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    margin-bottom: 20px;
  }

  input[type="text"]:focus {
    border-color: var(--orange);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,107,0,0.1);
  }

  input[type="text"]::placeholder { color: #C9A98A; font-weight: 400; }

  .btn-submit {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    color: #fff;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border: none;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 6px 20px rgba(255,107,0,0.4);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,0,0.5); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-submit .btn-text { transition: opacity 0.2s; }
  .btn-submit.loading .btn-text { opacity: 0; }
  .btn-submit .spinner {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .btn-submit.loading .spinner { opacity: 1; }
  .spinner-ring {
    width: 22px; height: 22px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success state */
  .success-screen {
    display: none;
    text-align: center;
    animation: successIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes successIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .success-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--success), #27AE60);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    margin: 0 auto 20px;
    box-shadow: 0 8px 28px rgba(46,204,113,0.4);
  }

  .success-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .success-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 10px;
  }

  .success-msg {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .success-time {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 20px;
    padding: 10px 18px;
    background: var(--bg);
    border-radius: 30px;
    display: inline-block;
  }

  /* Error msg */
  .error-msg {
    font-size: 13px;
    color: #E74C3C;
    text-align: center;
    margin-top: -12px;
    margin-bottom: 14px;
    display: none;
  }

  .footer {
    margin-top: 28px;
    font-size: 11px;
    color: #C9A98A;
    text-align: center;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="card" id="main-card">
  <!-- Sign in form -->
  <div id="form-screen">
    <div class="logo-wrap">
      <div class="logo-badge">✍️</div>
    </div>
    <h1>簽到</h1>
    <p class="sub">請輸入您的姓名完成簽到</p>

    <div class="field-label">您的姓名</div>
    <input type="text" id="name-input" placeholder="例：王小明" autocomplete="name" autocorrect="off" maxlength="20">
    <div class="error-msg" id="error-msg">請輸入姓名才能簽到</div>

    <button class="btn-submit" id="submit-btn" onclick="submitCheckIn()">
      <span class="btn-text">確認簽到 →</span>
      <span class="spinner"><span class="spinner-ring"></span></span>
    </button>
  </div>

  <!-- Success screen -->
  <div class="success-screen" id="success-screen">
    <div class="success-icon">✓</div>
    <div class="success-title">簽到成功！</div>
    <div class="success-name" id="success-name"></div>
    <div class="success-msg">您的出席已記錄<br>感謝您的參與 🎉</div>
    <div class="success-time" id="success-time"></div>
  </div>
</div>

<div class="footer">ATTENDANCE SYSTEM · 如有問題請洽主辦方</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw6kOmdPe42hQZ2pzJMfKj--0Qx454enrhzOtu-Cfl8VqziHoxKn62BeGRk59ct5_h/exec';

const nameInput = document.getElementById('name-input');
const submitBtn = document.getElementById('submit-btn');
const errorMsg = document.getElementById('error-msg');

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitCheckIn(); });
nameInput.addEventListener('input', () => { errorMsg.style.display = 'none'; });

async function submitCheckIn() {
  const name = nameInput.value.trim();
  if (!name) {
    errorMsg.style.display = 'block';
    nameInput.focus();
    return;
  }

  submitBtn.disabled = true;
  submitBtn.classList.add('loading');

  try {
    await fetch(API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });

    // Show success (no-cors means we can't read response, assume success)
    showSuccess(name);
  } catch (err) {
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
    errorMsg.textContent = '網路錯誤，請重試';
    errorMsg.style.display = 'block';
  }
}

function showSuccess(name) {
  const now = new Date();
  const timeStr = now.toLocaleString('zh-TW', {
    month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });

  document.getElementById('success-name').textContent = name;
  document.getElementById('success-time').textContent = '⏱ ' + timeStr;

  document.getElementById('form-screen').style.display = 'none';
  const ss = document.getElementById('success-screen');
  ss.style.display = 'block';
}
</script>
</body>
</html>
