<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>簽到／簽退</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C35;
    --orange-deep: #E05500;
    --bg: #FFF8F3;
    --surface: #FFFFFF;
    --text: #1A1208;
    --muted: #9E7B5A;
    --border: #F0DECE;
    --success: #2ECC71;
    --blue: #3B82F6;
    --blue-light: #60A5FA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,0.12), transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -100px; left: -100px;
    width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,53,0.08), transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface); border-radius: 28px; padding: 40px 32px;
    width: 100%; max-width: 420px;
    box-shadow: 0 4px 6px rgba(255,107,0,0.05), 0 20px 60px rgba(180,80,0,0.12);
    position: relative; z-index: 1;
    animation: cardIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.96)} to{opacity:1;transform:none} }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 0 0 4px 4px;
  }

  .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .logo-badge {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; box-shadow: 0 8px 24px rgba(255,107,0,0.35);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 8px 24px rgba(255,107,0,0.35)} 50%{box-shadow:0 8px 36px rgba(255,107,0,0.55)} }

  h1 { font-size: 24px; font-weight: 900; color: var(--text); text-align: center; letter-spacing: -0.02em; margin-bottom: 6px; }
  .sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }

  /* Action toggle */
  .action-toggle {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 24px;
  }
  .action-btn {
    padding: 14px 10px; border-radius: 14px; border: 2px solid var(--border);
    background: var(--bg); cursor: pointer; text-align: center;
    transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif;
  }
  .action-btn .btn-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .action-btn .btn-label { font-size: 15px; font-weight: 700; color: var(--muted); }

  .action-btn.active-in {
    border-color: var(--orange); background: rgba(255,107,0,0.06);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.12);
  }
  .action-btn.active-in .btn-label { color: var(--orange); }

  .action-btn.active-out {
    border-color: var(--blue); background: rgba(59,130,246,0.06);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .action-btn.active-out .btn-label { color: var(--blue); }

  .field-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  input[type="text"] {
    width: 100%; padding: 16px 20px; font-size: 18px;
    font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
    color: var(--text); background: var(--bg);
    border: 2px solid var(--border); border-radius: 14px;
    outline: none; transition: all 0.2s; margin-bottom: 8px;
  }
  input[type="text"]:focus { border-color: var(--orange); background: #fff; box-shadow: 0 0 0 4px rgba(255,107,0,0.1); }
  input[type="text"].focus-out:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
  input[type="text"]::placeholder { color: #C9A98A; font-weight: 400; }

  .error-msg { font-size: 13px; color: #E74C3C; margin-bottom: 14px; display: none; }

  .btn-submit {
    width: 100%; padding: 18px; font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; color: #fff; border: none;
    border-radius: 14px; cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.2s; position: relative; overflow: hidden;
    margin-top: 8px;
  }
  .btn-submit.mode-in { background: linear-gradient(135deg, var(--orange), var(--orange-light)); box-shadow: 0 6px 20px rgba(255,107,0,0.4); }
  .btn-submit.mode-out { background: linear-gradient(135deg, var(--blue), var(--blue-light)); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
  .btn-submit:hover { transform: translateY(-2px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-text { transition: opacity 0.2s; }
  .btn-submit.loading .btn-text { opacity: 0; }
  .spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .btn-submit.loading .spinner { opacity: 1; }
  .spinner-ring { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Success */
  .success-screen { display: none; text-align: center; animation: successIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both; }
  @keyframes successIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
  .success-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 0 auto 20px; }
  .success-icon.in { background: linear-gradient(135deg, var(--orange), var(--orange-light)); box-shadow: 0 8px 28px rgba(255,107,0,0.4); }
  .success-icon.out { background: linear-gradient(135deg, var(--blue), var(--blue-light)); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }
  .success-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .success-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .success-name.in { color: var(--orange); }
  .success-name.out { color: var(--blue); }
  .success-msg { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .success-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 18px; padding: 9px 18px; background: var(--bg); border-radius: 30px; display: inline-block; }
  .btn-again { margin-top: 20px; padding: 12px 28px; border: 2px solid var(--border); background: none; border-radius: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .btn-again:hover { border-color: var(--orange); color: var(--orange); }

  .footer { margin-top: 24px; font-size: 11px; color: #C9A98A; text-align: center; font-family: 'DM Mono', monospace; position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="card" id="main-card">
  <div id="form-screen">
    <div class="logo-wrap"><div class="logo-badge">✍️</div></div>
    <h1>出席登記</h1>
    <p class="sub">請選擇動作並輸入您的姓名</p>

    <!-- Toggle -->
    <div class="action-toggle">
      <div class="action-btn active-in" id="btn-in" onclick="setAction('in')">
        <span class="btn-icon">🟢</span>
        <span class="btn-label">簽到</span>
      </div>
      <div class="action-btn" id="btn-out" onclick="setAction('out')">
        <span class="btn-icon">🔵</span>
        <span class="btn-label">簽退</span>
      </div>
    </div>

    <div class="field-label">您的姓名</div>
    <input type="text" id="name-input" placeholder="例：王小明" autocomplete="name" autocorrect="off" maxlength="20">
    <div class="error-msg" id="error-msg">請輸入姓名才能繼續</div>

    <button class="btn-submit mode-in" id="submit-btn" onclick="submitAction()">
      <span class="btn-text" id="btn-text">確認簽到 →</span>
      <span class="spinner"><span class="spinner-ring"></span></span>
    </button>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon" id="success-icon"></div>
    <div class="success-title" id="success-title"></div>
    <div class="success-name" id="success-name"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="success-time" id="success-time"></div>
    <br>
    <button class="btn-again" onclick="resetForm()">← 返回再次登記</button>
  </div>
</div>

<div class="footer">出席登記系統 · 如有問題請洽主辦方</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw6kOmdPe42hQZ2pzJMfKj--0Qx454enrhzOtu-Cfl8VqziHoxKn62BeGRk59ct5_h/exec';
let currentAction = 'in';

function setAction(action) {
  currentAction = action;
  const btnIn = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const submitBtn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const nameInput = document.getElementById('name-input');

  if (action === 'in') {
    btnIn.className = 'action-btn active-in';
    btnOut.className = 'action-btn';
    submitBtn.className = 'btn-submit mode-in';
    btnText.textContent = '確認簽到 →';
    nameInput.className = '';
  } else {
    btnIn.className = 'action-btn';
    btnOut.className = 'action-btn active-out';
    submitBtn.className = 'btn-submit mode-out';
    btnText.textContent = '確認簽退 →';
    nameInput.className = 'focus-out';
  }
}

document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') submitAction(); });
document.getElementById('name-input').addEventListener('input', () => { document.getElementById('error-msg').style.display='none'; });

async function submitAction() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('name-input').focus();
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, action: currentAction === 'in' ? '簽到' : '簽退' })
    });
    showSuccess(name, currentAction);
  } catch(err) {
    btn.disabled = false;
    btn.classList.remove('loading');
    const em = document.getElementById('error-msg');
    em.textContent = '網路錯誤，請重試';
    em.style.display = 'block';
  }
}

function showSuccess(name, action) {
  const now = new Date();
  const timeStr = now.toLocaleString('zh-TW', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const isIn = action === 'in';

  document.getElementById('success-icon').className = 'success-icon ' + (isIn ? 'in' : 'out');
  document.getElementById('success-icon').textContent = isIn ? '✓' : '👋';
  document.getElementById('success-title').textContent = isIn ? '簽到成功！' : '簽退成功！';
  document.getElementById('success-name').className = 'success-name ' + (isIn ? 'in' : 'out');
  document.getElementById('success-name').textContent = name;
  document.getElementById('success-msg').textContent = isIn ? '您的到場已記錄，感謝參與 🎉' : '感謝您今天的參與，掰掰！👋';
  document.getElementById('success-time').textContent = '⏱ ' + timeStr;

  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';
}

function resetForm() {
  document.getElementById('name-input').value = '';
  document.getElementById('error-msg').style.display = 'none';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.classList.remove('loading');
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('success-screen').style.display = 'none';
  setAction('in');
}
</script>
</body>
</html>
