<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出席登記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C35;
    --bg: #FFF8F3;
    --surface: #FFFFFF;
    --text: #1A1208;
    --muted: #9E7B5A;
    --border: #F0DECE;
    --success: #2ECC71;
    --blue: #3B82F6;
    --blue-light: #60A5FA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,0.12), transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -100px; left: -100px;
    width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,53,0.08), transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface); border-radius: 28px; padding: 36px 28px;
    width: 100%; max-width: 440px;
    box-shadow: 0 4px 6px rgba(255,107,0,0.05), 0 20px 60px rgba(180,80,0,0.12);
    position: relative; z-index: 1;
    animation: cardIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.96)} to{opacity:1;transform:none} }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 0 0 4px 4px;
  }

  .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .logo-badge {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    font-size: 30px; box-shadow: 0 8px 24px rgba(255,107,0,0.35);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 8px 24px rgba(255,107,0,0.35)} 50%{box-shadow:0 8px 36px rgba(255,107,0,0.55)} }

  h1 { font-size: 24px; font-weight: 900; color: var(--text); text-align: center; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 26px; }

  /* Section label */
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .required-dot { color: var(--orange); font-size: 16px; line-height: 1; }

  /* Action toggle */
  .action-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .action-btn {
    padding: 14px 10px; border-radius: 14px; border: 2px solid var(--border);
    background: var(--bg); cursor: pointer; text-align: center; transition: all 0.18s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .action-btn .btn-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .action-btn .btn-label { font-size: 15px; font-weight: 700; color: var(--muted); }
  .action-btn.active-in { border-color: var(--orange); background: rgba(255,107,0,0.06); box-shadow: 0 0 0 3px rgba(255,107,0,0.1); }
  .action-btn.active-in .btn-label { color: var(--orange); }
  .action-btn.active-out { border-color: var(--blue); background: rgba(59,130,246,0.06); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .action-btn.active-out .btn-label { color: var(--blue); }

  /* School grid */
  .school-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 22px;
  }
  .school-btn {
    padding: 12px 10px; border-radius: 12px; border: 2px solid var(--border);
    background: var(--bg); cursor: pointer; text-align: center;
    transition: all 0.18s; font-family: 'Noto Sans TC', sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .school-btn .s-icon { font-size: 20px; }
  .school-btn .s-name { font-size: 12px; font-weight: 700; color: var(--muted); line-height: 1.3; }
  .school-btn.selected {
    border-color: var(--orange); background: rgba(255,107,0,0.07);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
  }
  .school-btn.selected .s-name { color: var(--orange); }

  /* shake animation for error */
  .shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

  /* Name input */
  input[type="text"] {
    width: 100%; padding: 15px 18px; font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
    color: var(--text); background: var(--bg);
    border: 2px solid var(--border); border-radius: 14px;
    outline: none; transition: all 0.2s; margin-bottom: 8px;
  }
  input[type="text"]:focus { border-color: var(--orange); background: #fff; box-shadow: 0 0 0 4px rgba(255,107,0,0.1); }
  input[type="text"].focus-out:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
  input[type="text"]::placeholder { color: #C9A98A; font-weight: 400; }

  .error-msg { font-size: 12px; color: #E74C3C; margin-bottom: 12px; display: none; padding-left: 2px; }

  /* Submit */
  .btn-submit {
    width: 100%; padding: 17px; font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; color: #fff; border: none;
    border-radius: 14px; cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.2s; position: relative; overflow: hidden; margin-top: 4px;
  }
  .btn-submit.mode-in { background: linear-gradient(135deg, var(--orange), var(--orange-light)); box-shadow: 0 6px 20px rgba(255,107,0,0.38); }
  .btn-submit.mode-out { background: linear-gradient(135deg, var(--blue), var(--blue-light)); box-shadow: 0 6px 20px rgba(59,130,246,0.38); }
  .btn-submit:hover { transform: translateY(-2px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-submit.loading .btn-text { opacity: 0; }
  .spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .btn-submit.loading .spinner { opacity: 1; }
  .spinner-ring { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Success */
  .success-screen { display: none; text-align: center; animation: successIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both; }
  @keyframes successIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }
  .success-icon { width: 76px; height: 76px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 18px; }
  .success-icon.in { background: linear-gradient(135deg, var(--orange), var(--orange-light)); box-shadow: 0 8px 28px rgba(255,107,0,0.4); }
  .success-icon.out { background: linear-gradient(135deg, var(--blue), var(--blue-light)); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }
  .success-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .success-name { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
  .success-name.in { color: var(--orange); }
  .success-name.out { color: var(--blue); }
  .success-school { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .success-msg { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .success-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 16px; padding: 8px 16px; background: var(--bg); border-radius: 30px; display: inline-block; }
  .btn-again { margin-top: 18px; padding: 11px 26px; border: 2px solid var(--border); background: none; border-radius: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .btn-again:hover { border-color: var(--orange); color: var(--orange); }

  .footer { margin-top: 22px; font-size: 11px; color: #C9A98A; text-align: center; font-family: 'DM Mono', monospace; position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="card">
  <!-- Form -->
  <div id="form-screen">
    <div class="logo-wrap"><div class="logo-badge">✍️</div></div>
    <h1>出席登記</h1>
    <p class="sub">請填寫以下資料完成登記</p>

    <!-- Step 1: Action -->
    <div class="section-label"><span class="required-dot">●</span> 簽到 / 簽退</div>
    <div class="action-toggle">
      <div class="action-btn active-in" id="btn-in" onclick="setAction('in')">
        <span class="btn-icon">🟢</span>
        <span class="btn-label">簽到</span>
      </div>
      <div class="action-btn" id="btn-out" onclick="setAction('out')">
        <span class="btn-icon">🔵</span>
        <span class="btn-label">簽退</span>
      </div>
    </div>

    <!-- Step 2: School -->
    <div class="section-label" id="school-label"><span class="required-dot">●</span> 選擇學校</div>
    <div class="school-grid" id="school-grid">
      <div class="school-btn" onclick="selectSchool(this, '中山大學')">
        <span class="s-icon">🏫</span>
        <span class="s-name">中山大學</span>
      </div>
      <div class="school-btn" onclick="selectSchool(this, '臺南大學')">
        <span class="s-icon">🏫</span>
        <span class="s-name">臺南大學</span>
      </div>
      <div class="school-btn" onclick="selectSchool(this, '嘉義大學')">
        <span class="s-icon">🏫</span>
        <span class="s-name">嘉義大學</span>
      </div>
      <div class="school-btn" onclick="selectSchool(this, '靜宜大學')">
        <span class="s-icon">🏫</span>
        <span class="s-name">靜宜大學</span>
      </div>
      <div class="school-btn" style="grid-column: span 2;" onclick="selectSchool(this, '淡江大學')">
        <span class="s-icon">🏫</span>
        <span class="s-name">淡江大學</span>
      </div>
    </div>
    <div class="error-msg" id="school-error">請選擇學校</div>

    <!-- Step 3: Name -->
    <div class="section-label"><span class="required-dot">●</span> 您的姓名</div>
    <input type="text" id="name-input" placeholder="例：王小明" autocomplete="name" autocorrect="off" maxlength="20">
    <div class="error-msg" id="name-error">請輸入姓名</div>

    <button class="btn-submit mode-in" id="submit-btn" onclick="submitAction()">
      <span class="btn-text" id="btn-text">確認簽到 →</span>
      <span class="spinner"><span class="spinner-ring"></span></span>
    </button>
  </div>

  <!-- Success -->
  <div class="success-screen" id="success-screen">
    <div class="success-icon" id="success-icon"></div>
    <div class="success-title" id="success-title"></div>
    <div class="success-name" id="success-name"></div>
    <div class="success-school" id="success-school"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="success-time" id="success-time"></div>
    <br>
    <button class="btn-again" onclick="resetForm()">← 返回再次登記</button>
  </div>
</div>

<div class="footer">出席登記系統 · 如有問題請洽主辦方</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw6kOmdPe42hQZ2pzJMfKj--0Qx454enrhzOtu-Cfl8VqziHoxKn62BeGRk59ct5_h/exec';
let currentAction = 'in';
let selectedSchool = '';

function setAction(action) {
  currentAction = action;
  const isIn = action === 'in';
  document.getElementById('btn-in').className = 'action-btn' + (isIn ? ' active-in' : '');
  document.getElementById('btn-out').className = 'action-btn' + (!isIn ? ' active-out' : '');
  document.getElementById('submit-btn').className = 'btn-submit ' + (isIn ? 'mode-in' : 'mode-out');
  document.getElementById('btn-text').textContent = isIn ? '確認簽到 →' : '確認簽退 →';
  const ni = document.getElementById('name-input');
  ni.className = isIn ? '' : 'focus-out';
}

function selectSchool(el, name) {
  document.querySelectorAll('.school-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSchool = name;
  document.getElementById('school-error').style.display = 'none';
}

document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') submitAction(); });
document.getElementById('name-input').addEventListener('input', () => { document.getElementById('name-error').style.display='none'; });

async function submitAction() {
  let hasError = false;

  if (!selectedSchool) {
    document.getElementById('school-error').style.display = 'block';
    document.getElementById('school-grid').classList.add('shake');
    setTimeout(() => document.getElementById('school-grid').classList.remove('shake'), 400);
    hasError = true;
  }

  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-error').style.display = 'block';
    if (!hasError) document.getElementById('name-input').focus();
    hasError = true;
  }

  if (hasError) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name,
        school: selectedSchool,
        action: currentAction === 'in' ? '簽到' : '簽退'
      })
    });
    showSuccess(name, selectedSchool, currentAction);
  } catch(err) {
    btn.disabled = false;
    btn.classList.remove('loading');
    document.getElementById('name-error').textContent = '網路錯誤，請重試';
    document.getElementById('name-error').style.display = 'block';
  }
}

function showSuccess(name, school, action) {
  const now = new Date();
  const timeStr = now.toLocaleString('zh-TW', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const isIn = action === 'in';

  document.getElementById('success-icon').className = 'success-icon ' + (isIn ? 'in' : 'out');
  document.getElementById('success-icon').textContent = isIn ? '✓' : '👋';
  document.getElementById('success-title').textContent = isIn ? '簽到成功！' : '簽退成功！';
  document.getElementById('success-name').className = 'success-name ' + (isIn ? 'in' : 'out');
  document.getElementById('success-name').textContent = name;
  document.getElementById('success-school').textContent = '🏫 ' + school;
  document.getElementById('success-msg').textContent = isIn ? '您的到場已記錄，感謝參與 🎉' : '感謝您今天的參與，掰掰！👋';
  document.getElementById('success-time').textContent = '⏱ ' + timeStr;

  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';
}

function resetForm() {
  selectedSchool = '';
  document.querySelectorAll('.school-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('name-input').value = '';
  document.getElementById('name-error').style.display = 'none';
  document.getElementById('school-error').style.display = 'none';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false; btn.classList.remove('loading');
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('success-screen').style.display = 'none';
  setAction('in');
}
</script>
</body>
</html>
